name: ubuntu_test_installed_version.yml


on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}

      - name: install library
        run: |
          cmake -S. -Bbuild -DCMAKE_BUILD_TYPE=Release --log-level=DEBUG -DCMAKE_INSTALL_PREFIX=./install_dir
          cmake --build ./build -j$(nproc)
          cmake --install ./build --prefix ./install_dir
          rm -rf build

      - name: configure with installed version via cmake
        run: CMAKE_PREFIX_PATH="./install_dir" cmake -S. -Bbuild2 -DMAGIC_ENUM_OPT_TEST_INSTALLED_VERSION=1 --log-level=DEBUG

      - name: build with installed version via cmake
        run: cmake --build build2 --config Debug -j$(nproc) --verbose

      - name: test
        run: |
          cd build2
          ctest --build-config Debug -j$(nproc)

      - name: clear 
        run: rm -rf build2
      
      - name: configure clang
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo apt-add-repository "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main"
          sudo apt update
          sudo apt install clang-19 -y
      
      - name: install module library
        run: |
          cmake -S. -Bbuild \
            -GNinja \
            --log-level=DEBUG \
            -DCMAKE_INSTALL_PREFIX=./install_dir_module \
            -DMAGIC_ENUM_USE_MODULES=ON \
            -DCMAKE_CXX_COMPILER=clang++-19
          cmake --build build --target magic_enum
          cmake --install build
          rm -rf build

      - name: configure with installed module version via cmake
        run: |
          CMAKE_PREFIX_PATH="./install_dir_module" cmake -S. -Bbuild2 \
            -GNinja \
            -DMAGIC_ENUM_OPT_TEST_INSTALLED_VERSION=1 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            --log-level=DEBUG

      - name: build with installed module version via cmake
        run: cmake --build build2 -j$(nproc) --target test_flags-cpp20 --verbose

      - name: clear 
        run: rm -rf build2

      - name: configure with installed version via pkgconfig
        run: CMAKE_PREFIX_PATH="./install_dir" cmake -S. -Bbuild3 -DMAGIC_ENUM_OPT_TEST_INSTALLED_VERSION_PKGCONFIG=1 -DPKG_CONFIG_USE_CMAKE_PREFIX_PATH=1 --log-level=DEBUG

      - name: build with installed version via pkgconfig
        run: cmake --build build3 --config Debug -j$(nproc) --verbose

      - name: test
        run: |
          cd build3
          ctest --build-config Debug -j$(nproc)
