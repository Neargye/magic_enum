name: ubuntu_test_installed_version.yml


on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

env:
  CTEST_OUTPUT_ON_FAILURE: 1
  CPM_SOURCE_CACHE: ${{ github.workspace }}/cpm_modules

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v7

      - uses: actions/cache@v6
        with:
          path: "**/cpm_modules"
          key: ${{ github.workflow }}-cpm-modules-${{ hashFiles('**/CMakeLists.txt', '**/*.cmake') }}

      - name: install library
        run: |
          cmake -S . -B build-install -DCMAKE_BUILD_TYPE=Release --log-level=DEBUG -DCMAKE_INSTALL_PREFIX=./install_dir
          cmake --build build-install --parallel
          cmake --install build-install --prefix ./install_dir
          rm -rf build-install

      - name: configure with installed version via cmake
        run: CMAKE_PREFIX_PATH="./install_dir" cmake -S . -B build-installed-cmake -DMAGIC_ENUM_OPT_TEST_INSTALLED_VERSION=1 --log-level=DEBUG

      - name: build with installed version via cmake
        run: cmake --build build-installed-cmake --config Debug --parallel --verbose

      - name: test (cmake)
        run: ctest --test-dir build-installed-cmake --build-config Debug --parallel $(nproc)

      - name: clear
        run: rm -rf build-installed-cmake

      - name: configure clang
        run: |
          wget -qO - https://apt.llvm.org/llvm-snapshot.gpg.key | gpg --dearmor | sudo tee /etc/apt/keyrings/llvm-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/etc/apt/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/noble/ llvm-toolchain-noble-19 main" | sudo tee /etc/apt/sources.list.d/llvm.list
          sudo apt update
          sudo apt install clang-19 -y

      - name: install module library
        run: |
          cmake -S . -B build-module-install \
            -GNinja \
            --log-level=DEBUG \
            -DCMAKE_INSTALL_PREFIX=./install_dir_module \
            -DMAGIC_ENUM_USE_MODULES=ON \
            -DCMAKE_CXX_COMPILER=clang++-19
          cmake --build build-module-install --target magic_enum --parallel
          cmake --install build-module-install
          rm -rf build-module-install

      - name: configure with installed module version via cmake
        run: |
          CMAKE_PREFIX_PATH="./install_dir_module" cmake -S . -B build-installed-module \
            -GNinja \
            -DMAGIC_ENUM_OPT_TEST_INSTALLED_VERSION=1 \
            -DCMAKE_CXX_COMPILER=clang++-19 \
            --log-level=DEBUG

      - name: build with installed module version via cmake
        run: cmake --build build-installed-module --parallel --target test_flags-cpp20 --verbose

      - name: test (modules)
        run: ctest --test-dir build-installed-module -VV -R test_flags-cpp20

      - name: clear
        run: rm -rf build-installed-module

      - name: configure with installed version via pkgconfig
        run: CMAKE_PREFIX_PATH="./install_dir" cmake -S . -B build-installed-pkgconfig -DMAGIC_ENUM_OPT_TEST_INSTALLED_VERSION_PKGCONFIG=1 -DPKG_CONFIG_USE_CMAKE_PREFIX_PATH=1 --log-level=DEBUG

      - name: build with installed version via pkgconfig
        run: cmake --build build-installed-pkgconfig --config Debug --parallel --verbose

      - name: test (pkgconfig)
        run: ctest --test-dir build-installed-pkgconfig --build-config Debug --parallel $(nproc)
